# Docker Compose — 咖啡烘焙系统
# Usage: docker compose up -d

version: "3.9"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: coffee
      POSTGRES_PASSWORD: coffee123
      POSTGRES_DB: coffee_roast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee -d coffee_roast"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://coffee:coffee123@db:5432/coffee_roast
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:4173"]'
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/data/uploads

volumes:
  pgdata:

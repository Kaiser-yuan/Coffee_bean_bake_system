# Docker Compose — Production deployment
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# IMPORTANT:
#   - Change all passwords before first deploy.
#   - PostgreSQL is NOT exposed to the host network.
#   - Only the backend port (8000) is exposed for Nginx reverse proxy.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coffee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: coffee_roast
    # Internal only — no ports published
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coffee} -d coffee_roast"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "127.0.0.1:8000:8000"   # only bind loopback; Nginx proxies from outside
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-coffee}:${POSTGRES_PASSWORD}@db:5432/coffee_roast
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_MAX_SIZE_BYTES: 20971520
      UPLOAD_DIR: data/uploads
      PUBLIC_FRONTEND_BASE_URL: ${PUBLIC_FRONTEND_BASE_URL}
      ALLOW_FIRST_USER_REGISTRATION: "false"
      APP_TIMEZONE: Asia/Shanghai
      BULK_UPLOAD_MAX_FILES: 20
      BULK_UPLOAD_MAX_TOTAL_BYTES: 104857600
      BULK_JOB_EXPIRY_SECONDS: 86400
      PUBLIC_EVALUATION_RATE_LIMIT_PER_MINUTE: 10
      PUBLIC_EVALUATION_REPEAT_WINDOW_SECONDS: 300
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/data/uploads
    restart: unless-stopped

volumes:
  pgdata:
